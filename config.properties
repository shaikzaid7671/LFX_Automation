# Appium Server Configuration
appium.server.url=http://127.0.0.1:4723
appium.server.path=/

# Device Configuration (EMULATOR)
platform=Android
automation.name=UiAutomator2
device.name=emulator-5554
platform.version=13

# App Configuration
app.path=apps/LFXTestV0.0.3.apk

# App Package and Activity
app.package=com.lfx.app
